            children:
              - url: "{{baseUrl}}/Account/v1/User"
                name: Create User
                meta:
                  id: req_89efd08919a94148bea8b800fb625411
                  created: 1773284182637
                  modified: 1779521067635
                  isPrivate: false
                  description: ""
                  sortKey: -1773285177424
                method: POST
                body:
                  mimeType: application/json
                  text: |-
                    {
                      "userName": "{{ _.user }}",
                      "password": "{{ _.pwd }}"
                    }
                headers:
                  - name: Content-Type
                    value: application/json
                  - name: User-Agent
                    value: insomnia/12.4.0
                    description: ""
                    disabled: false
                scripts:
                  preRequest: "\n\n"
                  afterResponse: >+
                    

                    const myFolder = insomnia.parentFolders.get('Bookstore
                    APIs');

                    if (myFolder === undefined) {
                    	throw Error('myFolder not found');
                    }


                    insomnia.test('Check if status is 201', () => {
                        insomnia.expect(insomnia.response.code).to.eql(201);
                    });


                    const jsonBody = insomnia.response.json();


                    myFolder.environment.set('userID', jsonBody.userID);

                    myFolder.environment.set('userName', jsonBody.username);

                settings:
                  renderRequestBody: true
                  encodeUrl: true
                  followRedirects: global
                  cookies:
                    send: true
                    store: true
                  rebuildPath: true
              - url: https://bookstore.toolsqa.com/Account/v1/GenerateToken
                name: GenerateToken
                meta:
                  id: req_0b47602f62e54a6bb5a74e3d372b5f96
                  created: 1779521095217
                  modified: 1779521489208
                  isPrivate: false
                  description: ""
                  sortKey: -1773285177324
                method: POST
                body:
                  mimeType: application/json
                  text: |-
                    {
                      "userName" : "{{ _.userName }}",
                      "password": "{{pwd}}"
                    }
                headers:
                  - name: Content-Type
                    value: application/json
                  - name: User-Agent
                    value: insomnia/12.4.0
                    description: ""
                    disabled: false
                scripts:
                  afterResponse: >+
                    
                    const jsonBody = insomnia.response.json();


                    insomnia.test('Check if status is 200', () => {
                        insomnia.expect(insomnia.response.code).to.eql(200);
                    });


                    insomnia.test('Check if result is - User authorized
                    successfully.', () => {
                        insomnia.expect(jsonBody.result).to.eql("User authorized successfully.");
                    });



                    const myFolder = insomnia.parentFolders.get('Bookstore
                    APIs');

                    if (myFolder === undefined) {
                    	throw Error('myFolder not found');
                    }

                    myFolder.environment.set('token', jsonBody.token);

                settings:
                  renderRequestBody: true
                  encodeUrl: true
                  followRedirects: global
                  cookies:
                    send: true
                    store: true
                  rebuildPath: true
