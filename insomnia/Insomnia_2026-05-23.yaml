                    method: GET
                    headers:
                      - name: User-Agent
                        value: insomnia/12.4.0
                        description: ""
                        disabled: false
                    authentication:
                      type: bearer
                      disabled: true
                      token: "{{ _.token }}"
                    scripts:
                      afterResponse: >
                        
                        const jsonBody = insomnia.response.json();


                        insomnia.test('Check if status is 401', () => {
                            insomnia.expect(insomnia.response.code).to.eql(401);
                        });



                        insomnia.test('Check message', () => {
                            insomnia.expect(jsonBody.message).to.eql("User not authorized!");
                        });
                    settings:
                      renderRequestBody: true
                      encodeUrl: true
                      followRedirects: global
                      cookies:
                        send: true
                        store: true
                      rebuildPath: true
