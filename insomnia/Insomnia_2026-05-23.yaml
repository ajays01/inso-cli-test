                  created: 1773285196652
                  modified: 1779522445193
                  sortKey: -1773285177024
                  description: ""
                children:
                  - url: "{{baseUrl}}/Account/v1/User"
                    name: Create User - Invalid password
                    meta:
                      id: req_ecc94bdb68b24ed086d50bb6a47fc492
                      created: 1773284367407
                      modified: 1779522376748
                      isPrivate: false
                      description: ""
                      sortKey: -1773285202928
                    method: POST
                    body:
                      mimeType: application/json
                      text: |-
                        {
                          "userName": "{{username}}",
                          "password": "{{password}}"
                        }
                    headers:
                      - name: Content-Type
                        value: application/json
                      - name: User-Agent
                        value: insomnia/12.4.0
                        description: ""
                        disabled: false
                    scripts:
                      afterResponse: >+
                        
                        insomnia.test('Check if status is 400', () => {
                            insomnia.expect(insomnia.response.code).to.eql(400);
                        });



                        const jsonBody = insomnia.response.json();


                        insomnia.test('Validate error message', () => {
                            insomnia.expect(jsonBody.message).to.eql("Passwords must have at least one non alphanumeric character, one digit ('0'-'9'), one uppercase ('A'-'Z'), one lowercase ('a'-'z'), one special character and Password must be eight characters or longer.");
                        });


                    settings:
                      renderRequestBody: true
                      encodeUrl: true
                      followRedirects: global
                      cookies:
                        send: true
                        store: true
                      rebuildPath: true
                  - url: https://bookstore.toolsqa.com/Account/v1/User/{{ _.userID }}
                    name: Get User - no token
                    meta:
                      id: req_4e09bd0aeddf4379a31db0b04c64d96e
